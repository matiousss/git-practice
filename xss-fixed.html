<!DOCTYPE html>
<html>
<head><title>Исправленная страница</title></head>
<body>
<h1>Поиск по сайту</h1>
<p>Вы искали: <span id="searchResult"></span></p>
<script>
const urlParams = new URLSearchParams(window.location.search);
const userQuery = urlParams.get("query") || "ничего";
// Безопасно
document.getElementById("searchResult").textContent = userQuery;
</script>
</body>
</html>
